<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/assets/images/favicon-16x16.png" type="image/x-icon">
    <title>Pokedex</title>
</head>

<body>
    <main>
        <img src="/assets/images/pokedex.png" alt="pokedex">
        <h1 class="dados_pokemon">
            <span class="numero-pokemon"></span>
            <span class="nome_pokemon"></span>
        </h1>
        <form class="formulario">
            <input type="search" class="campo_busca" placeholder="Nome ou número" required>
        </form>
        <div class="botoes">
            <button class="botao_anterior">Anterior</button>
            <button class="botao_proximo">Próximo</button>
        </div>
        <img src="/assets/images/pokedex.png" alt="">
        <script src="/assets/scripts/script.js"></script>
    </main>
</body>

</html>
